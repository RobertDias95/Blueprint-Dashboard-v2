name: CI

on:
  push:
    branches: ['**']
  pull_request:

# fix-ci-checkout-auth: explicitly grant the built-in GITHUB_TOKEN read access
# to repo contents. Without this, the token inherits the repo/org default
# "Workflow permissions" — and when that default is restricted, actions/checkout
# has no credential and fails with "could not read Username for
# 'https://github.com': terminal prompts disabled" before any code runs.
permissions:
  contents: read

jobs:
  verify:
    name: Verify (typecheck + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
